name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install
      - run: cd apps/api && npm run build

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install
      - run: cd apps/web && npm run build

  build-docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build API image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/api
          push: false
          tags: task-tracker-api:${{ github.sha }}

      - name: Build Web image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/web
          push: false
          tags: task-tracker-web:${{ github.sha }}
