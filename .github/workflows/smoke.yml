name: Smoke

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "docker-compose.yml"
      - "package.json"
      - "scripts/**"
      - ".github/workflows/**"
  push:
    branches: [main]

jobs:
  smoke-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm install
      - run: npm run smoke
